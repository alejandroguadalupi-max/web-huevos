    <style>

            color: red;
        }

        #form-reserva {
            display: flex;
            gap: 10%;
            margin-top:5%;
            justify-content: center;
        }

        #carton12 {
            font-family: Oswald, sans-serif;
            background-color: #f5f5f5;
            max-width: 25%;
            padding: 0% 2% 1.5% 2%;
            text-align: left;
            border-radius: 5%;
            border-style: dashed;
            border-color:rgba(7, 7, 64, 0.719);

        #carton24 {

        #carton30 {

        footer {
            font-family: Oswald, sans-serif;
            margin-top: 30%; 
            padding: 1.5%;
            background-color: rgb(168, 142, 27);
            text-align: center;

        }

        .subtitulo-container {
            width: 100%;
            overflow: hidden;
            position: relative;
            background: #ebeef4;
            height: 50px;
            margin: 0 auto;
        }

        #subtitulo {
            font-family: Oswald;
            font-weight: normal;
            display: inline-block;   /* asi texto se convierte en bloque */
            white-space: nowrap;     /* Mantiene el texto en una línea */
            position: absolute;
            top: 50%;
            transform: translateY(-100%);
            right: -100%;            /* Empieza fuera del lado izquierdo */
            animation: moverDerecha 15s linear infinite;   /* funcion a ejecutar, lineal, e infinita (en bucle) */
        }

        @keyframes moverDerecha {
            0% {
                right: -100%;        /* Fuera del contenedor por la izquierda */
            }
            100% {
                right: 100%;         /* Sale completamente por la derecha */
                }
        }

        
    </style>

</head>

<body>
    
    <div id = "margenizq">
        <h1 id="titulo">¡Bienvenid@!</h1>
        <h2 id="titulo2">Haz tu reserva fácilmente desde esta web</h2>
        <br>
        <div class = "subtitulo-container">
            <h2 id = "subtitulo">Nos quedan <span id="stock">Cargando...</span> unidades. ¡Corre y haz tu reserva!</h2>
        </div>
        

        <form id="formReserva">
            
            <div id = "carton12">
            <h3>CARTÓN DE 12 HUEVOS</h3>
            <p>Precio: 3€</p>
            <select id = "carton12-select">
                <option>Ninguno</option>
                <option>1 cartón</option>
            </select>
            </div>

            <div id = "carton24">
            <h3>CARTÓN DE 24 HUEVOS</h3>
            <p>Precio: 6€</p>
            <select id = "carton24-select">
                <option>Ninguno</option>
                <option>1 cartón</option>
            </select>
            </div>

            <div id = "carton30">
            <h3>CARTÓN DE 30 HUEVOS</h3>
            <p>Precio: 12€</p>
            <select id = "carton30-select">
                <option>Ninguno</option>
                <option>1 cartón</option>
            </select>
            
            <div id = "boton-reserva">
                <button type="submit" id="hacer-reserva">Hacer reserva</button>     
            </button>
        
        </form>

        </div>
        

        </div>
    </div>
        
       

        <script>
            document.getElementById("formReserva").addEventListener("submit", function(e) {
                e.preventDefault();
                const carton12 = document.getElementById("carton12-select").value;
                const carton24 = document.getElementById("carton24-select").value;      //cogemos valores seleccionados en cada select de opciones
                const carton30 = document.getElementById("carton30-select").value;

                localStorage.setItem("carton12", carton12);
                localStorage.setItem("carton24", carton24);
                localStorage.setItem("carton30", carton30);

                window.location.href = "reserva.html";
            });



        </script>

        <footer><strong><em>---------------- Entregas los domingos ----------------</em></strong></footer>

        // Crea el cliente Supabase solo una vez
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        async function cargarStock() {

                const { data, error } = await supabaseClient
                    .from("stock")
                    .select("*")
                    .eq("producto", "Huevos")
                    .single();

                if (error) {
                    console.error("ERROR:", error);
                    document.getElementById("stock").innerText = "Error: " + error.message;
                    return;
                }

                console.log("Datos recibidos:", data);
                document.getElementById("stock").innerText = data.cantidad;
            
        }

        cargarStock();
